<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세션 만들기 (강사용) - 실시간 워드클라우드</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./css/style.css?v=9" />
  <style>
    .session-list { display: flex; flex-direction: column; gap: 0.6rem; }
    /* 위: 코드 배지 + 이름·질문 / 아래: 버튼 — 이름이 버튼에 밀려 잘리지 않도록 */
    .session-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      grid-template-areas: "badge info" "actions actions";
      gap: 0.55rem 0.8rem; align-items: center;
      border: 1px solid var(--border); border-radius: 14px; padding: 0.85rem 0.95rem;
    }
    .session-info { grid-area: info; min-width: 0; }
    .session-name {
      font-weight: 600; font-size: 0.98rem; word-break: keep-all;
      overflow-wrap: anywhere; line-height: 1.35;
    }
    .session-q {
      margin-top: 0.15rem; font-size: 0.83rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-code-badge {
      grid-area: badge; align-self: center;
      font-weight: 600; letter-spacing: 0.15em; color: var(--accent);
      background: var(--accent-soft); border-radius: 10px; padding: 0.4rem 0.7rem; font-size: 0.95rem;
    }
    .session-actions {
      grid-area: actions;
      display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: flex-end;
      padding-top: 0.45rem; border-top: 1px solid var(--border);
    }
    .session-actions .tool-btn { white-space: nowrap; }
    .tool-btn.danger { color: var(--danger); }
    .tool-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .session-item.editing { display: block; }
    .session-edit { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
    .session-edit .input { font-size: 0.9rem; }
    .session-edit .session-actions { justify-content: flex-end; border-top: 0; padding-top: 0; }
    .session-edit .status-msg { margin: 0; }
    .empty-list { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body class="auth-pending">
  <div class="page-title">
    <h1><svg class="icon title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></svg> 세션 만들기</h1>
    <p>세션 이름과 질문을 입력하면 참여 코드와 QR이 자동으로 생성됩니다.</p>
  </div>

  <main>
    <div class="container">
      <div class="card">
        <div class="field">
          <label for="sessionName">세션 이름 (관리용 · 날짜_수업명)</label>
          <input id="sessionName" class="input" maxlength="40" placeholder="20260712_AI기초" />
        </div>
        <div class="field">
          <label for="question">질문 (교육생에게 보여질 주제)</label>
          <input id="question" class="input" maxlength="80" placeholder="예) 오늘 수업에서 기대하는 것을 한 단어로 적어주세요" />
        </div>
        <div class="option-row" style="display:flex;gap:0.8rem">
          <div class="field" style="flex:1">
            <label for="inputMode">입력 형식</label>
            <select id="inputMode" class="select">
              <option value="word" selected>단어 (조사 정리·집계, 12자)</option>
              <option value="phrase">짧은 문구 (띄어쓰기 허용, 30자)</option>
            </select>
          </div>
          <div class="field" style="flex:1">
            <label for="maxPerUser">1인당 제출 개수</label>
            <select id="maxPerUser" class="select">
              <option value="1">1개</option>
              <option value="2">2개</option>
              <option value="3" selected>3개</option>
              <option value="5">5개</option>
            </select>
          </div>
        </div>
        <button id="createBtn" class="btn btn-primary btn-block">세션 만들고 발표 화면 열기</button>
        <p id="createStatus" class="status-msg"></p>
      </div>

      <div class="card">
        <h2><svg class="icon title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg> 내 세션 목록</h2>
        <div id="sessionList" class="session-list"></div>
        <p id="listHint" class="form-hint" style="margin-top:0.8rem">
          목록은 강사 계정에 저장됩니다. 다른 컴퓨터에서 로그인해도 같은 목록이 보입니다.
        </p>
        <button id="findBtn" class="btn btn-ghost btn-block" style="margin-top:0.6rem">목록에 없는 지난 세션 찾기</button>
        <p id="findStatus" class="status-msg"></p>
        <div id="foundList" class="session-list" style="margin-top:0.6rem"></div>
      </div>

      <div class="card">
        <h2><svg class="icon title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg> 코드로 열기</h2>
        <div class="field">
          <input id="reopenCode" class="input code-input" maxlength="4" placeholder="ABCD" autocomplete="off" />
        </div>
        <button id="reopenBtn" class="btn btn-ghost btn-block">발표 화면 열기</button>
        <p id="reopenStatus" class="status-msg"></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__line">
      &copy; 2026 EUNACLASS
      <span class="footer__sep">&middot;</span>
      AI Learning Tools for Education
      <span class="footer__sep">&middot;</span>
      <a href="./index.html">참여자 홈으로</a>
      <span class="footer__sep">&middot;</span>
      <a href="#" id="logoutLink">로그아웃</a>
    </p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="./js/firebase-config.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/auth.js"></script>
  <script>
    const db = initFirebase();
    const createStatus = document.getElementById("createStatus");
    const reopenStatus = document.getElementById("reopenStatus");
    const STORAGE_KEY = "wc_my_sessions";

    /* ── 내 세션 목록 (강사 계정 기준 클라우드 저장 · localStorage는 캐시) ── */
    let instructorUid = null;
    let mySessions = [];
    let cloudReady = false;   // 규칙 미게시 등으로 실패하면 이 브라우저 목록만 사용

    function myListRef() {
      return db.ref("instructors/" + instructorUid + "/sessions");
    }

    function localSessions() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch (_) { return []; }
    }

    function cacheLocally() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(mySessions.slice(0, 100)));
    }

    function byNewest(list) {
      return [...list].sort((a, b) => (b.created || 0) - (a.created || 0));
    }

    // 보안 규칙 검증을 통과하도록 필드를 정규화
    function cloudEntry(s) {
      return {
        name: (s.name || "(이름 없음)").slice(0, 40),
        q: (s.q || "").slice(0, 80),
        mode: s.mode === "phrase" ? "phrase" : "word",
        max: Number(s.max) >= 1 && Number(s.max) <= 5 ? Number(s.max) : 3,
        created: Number(s.created) || Date.now()
      };
    }

    async function saveMySession(entry) {
      mySessions = byNewest([entry, ...mySessions.filter((s) => s.code !== entry.code)]);
      cacheLocally();
      if (cloudReady) {
        try { await myListRef().child(entry.code).set(cloudEntry(entry)); } catch (_) {}
      }
    }

    async function removeMySession(code) {
      mySessions = mySessions.filter((s) => s.code !== code);
      cacheLocally();
      renderSessionList();
      if (cloudReady) {
        try { await myListRef().child(code).remove(); } catch (_) {}
      }
    }

    async function updateMySession(code, patch) {
      mySessions = mySessions.map((s) => (s.code === code ? { ...s, ...patch } : s));
      cacheLocally();
      if (cloudReady) {
        try { await myListRef().child(code).update(patch); } catch (_) {}
      }
    }

    // 로그인한 계정의 목록을 불러오고, 이 브라우저에만 있던 세션은 계정으로 올린다
    async function initSessionList(user) {
      instructorUid = user.uid;
      const local = localSessions();
      try {
        const snap = await myListRef().get();
        const cloud = [];
        snap.forEach((child) => { cloud.push({ code: child.key, ...child.val() }); });
        cloudReady = true;

        const known = new Set(cloud.map((s) => s.code));
        const onlyLocal = local.filter((s) => s.code && !known.has(s.code));
        mySessions = byNewest([...cloud, ...onlyLocal]);
        cacheLocally();
        renderSessionList();

        for (const s of onlyLocal) {
          try { await myListRef().child(s.code).set(cloudEntry(s)); } catch (_) {}
        }
      } catch (_) {
        cloudReady = false;
        mySessions = byNewest(local);
        renderSessionList();
        const hint = document.getElementById("listHint");
        hint.textContent = "계정 목록을 불러오지 못했습니다. 이 브라우저에 저장된 목록만 표시합니다. (보안 규칙 재게시가 필요할 수 있습니다)";
        hint.className = "status-msg error";
      }
    }

    function formatDate(timestamp) {
      if (!timestamp) return "";
      const d = new Date(timestamp);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
    }

    function renderSessionList() {
      const listEl = document.getElementById("sessionList");
      const sessions = mySessions;
      if (sessions.length === 0) {
        listEl.innerHTML = '<p class="empty-list">아직 만든 세션이 없습니다.</p>';
        return;
      }
      listEl.innerHTML = "";
      sessions.forEach((s) => {
        const item = document.createElement("div");
        item.className = "session-item";

        const info = document.createElement("div");
        info.className = "session-info";
        const name = document.createElement("div");
        name.className = "session-name";
        name.textContent = s.name || "(이름 없음)";
        const q = document.createElement("div");
        q.className = "session-q";
        q.textContent = `${formatDate(s.created)} · ${s.q || ""}`;
        info.appendChild(name);
        info.appendChild(q);

        const badge = document.createElement("span");
        badge.className = "session-code-badge";
        badge.textContent = s.code;

        const actions = document.createElement("div");
        actions.className = "session-actions";
        const openBtn = document.createElement("button");
        openBtn.className = "tool-btn";
        openBtn.textContent = "발표 열기";
        openBtn.addEventListener("click", () => {
          location.href = "present.html?code=" + encodeURIComponent(s.code);
        });
        const editBtn = document.createElement("button");
        editBtn.className = "tool-btn";
        editBtn.textContent = "수정";
        editBtn.title = "세션 이름·질문(주제)을 변경합니다";
        editBtn.addEventListener("click", () => startEdit(item, s));
        const delBtn = document.createElement("button");
        delBtn.className = "tool-btn";
        delBtn.textContent = "목록에서 숨기기";
        delBtn.title = "내 목록에서만 숨깁니다 (세션과 단어는 그대로 유지)";
        delBtn.addEventListener("click", () => {
          if (confirm(`“${s.name || s.code}” 을(를) 내 목록에서 숨길까요?\n세션과 학생 단어는 그대로 남고, “목록에 없는 지난 세션 찾기”로 다시 불러올 수 있습니다.`)) {
            removeMySession(s.code);
          }
        });
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "tool-btn danger";
        deleteBtn.textContent = "완전 삭제";
        deleteBtn.title = "세션과 학생 단어를 DB에서 완전히 삭제합니다";
        deleteBtn.addEventListener("click", () => deleteSession(s, null));
        actions.appendChild(openBtn);
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        actions.appendChild(deleteBtn);

        item.appendChild(info);
        item.appendChild(badge);
        item.appendChild(actions);
        listEl.appendChild(item);
      });
    }

    /* ── 세션 완전 삭제 (DB에서 제거 · 되돌릴 수 없음) ── */
    async function deleteSession(s, itemEl) {
      let count = s.entryCount;
      if (count === undefined) {
        try {
          const snap = await sessionRef(db, s.code).child("entries").get();
          count = snap.exists() ? snap.numChildren() : 0;
        } catch (_) { count = 0; }
      }
      const message = `“${s.name || s.code}” (${s.code}) 세션을 완전히 삭제할까요?\n` +
        `학생이 제출한 단어 ${count}개가 함께 사라지며, 되돌릴 수 없습니다.`;
      if (!confirm(message)) return;

      try {
        await sessionRef(db, s.code).remove();
      } catch (err) {
        const detail = err && (err.code || err.message) ? `\n(${err.code || ""} ${err.message || ""})`.trim() : "";
        alert("삭제에 실패했습니다. 로그인 상태와 보안 규칙을 확인해 주세요." + detail);
        return;
      }
      if (mySessions.some((m) => m.code === s.code)) {
        await removeMySession(s.code);   // 계정 목록에서도 제거
      }
      if (itemEl) itemEl.remove();
    }

    /* ── 목록에 없는 지난 세션 찾기 (DB 전체에서 검색해 계정 목록에 복구) ── */
    const findStatus = document.getElementById("findStatus");
    const foundListEl = document.getElementById("foundList");

    async function findMissingSessions() {
      if (!db) return;
      foundListEl.innerHTML = "";
      findStatus.textContent = "찾는 중...";
      findStatus.className = "status-msg";

      let snap;
      try {
        snap = await db.ref("sessions").get();
      } catch (_) {
        findStatus.textContent = "세션을 읽지 못했습니다. 로그인 상태와 보안 규칙을 확인해 주세요.";
        findStatus.className = "status-msg error";
        return;
      }

      const known = new Set(mySessions.map((s) => s.code));
      const found = [];
      snap.forEach((child) => {
        const code = child.key;
        if (known.has(code)) return;
        const value = child.val() || {};
        const meta = value.meta || {};
        found.push({
          code,
          name: meta.name || "(이름 없음)",
          q: meta.q || "",
          mode: meta.mode || "word",
          max: meta.max || 3,
          created: meta.created || 0,
          entryCount: value.entries ? Object.keys(value.entries).length : 0
        });
      });
      found.sort((a, b) => (b.created || 0) - (a.created || 0));

      if (found.length === 0) {
        findStatus.textContent = "목록에 없는 세션이 없습니다.";
        return;
      }
      findStatus.textContent = `목록에 없는 세션 ${found.length}개를 찾았습니다. 필요한 세션을 목록에 추가하세요.`;

      found.forEach((s) => {
        const item = document.createElement("div");
        item.className = "session-item";

        const info = document.createElement("div");
        info.className = "session-info";
        const name = document.createElement("div");
        name.className = "session-name";
        name.textContent = s.name;
        const sub = document.createElement("div");
        sub.className = "session-q";
        sub.textContent = `${formatDate(s.created)} · 단어 ${s.entryCount}개 · ${s.q}`;
        info.appendChild(name);
        info.appendChild(sub);

        const badge = document.createElement("span");
        badge.className = "session-code-badge";
        badge.textContent = s.code;

        const actions = document.createElement("div");
        actions.className = "session-actions";
        const addBtn = document.createElement("button");
        addBtn.className = "tool-btn";
        addBtn.textContent = "목록에 추가";
        addBtn.addEventListener("click", async () => {
          addBtn.disabled = true;
          await saveMySession({ code: s.code, name: s.name, q: s.q, mode: s.mode, max: s.max, created: s.created || Date.now() });
          item.remove();
          renderSessionList();
        });
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "tool-btn danger";
        deleteBtn.textContent = "완전 삭제";
        deleteBtn.title = "세션과 학생 단어를 DB에서 완전히 삭제합니다";
        deleteBtn.addEventListener("click", () => deleteSession(s, item));
        actions.appendChild(addBtn);
        actions.appendChild(deleteBtn);

        item.appendChild(info);
        item.appendChild(badge);
        item.appendChild(actions);
        foundListEl.appendChild(item);
      });
    }

    document.getElementById("findBtn").addEventListener("click", findMissingSessions);

    /* ── 세션 이름·질문 수정 (인라인) ── */
    function startEdit(item, s) {
      item.classList.add("editing");
      item.innerHTML = "";

      const form = document.createElement("div");
      form.className = "session-edit";

      const nameInput = document.createElement("input");
      nameInput.className = "input";
      nameInput.maxLength = 40;
      nameInput.value = s.name || "";
      nameInput.placeholder = "세션 이름 (날짜_수업명)";

      const qInput = document.createElement("input");
      qInput.className = "input";
      qInput.maxLength = 80;
      qInput.value = s.q || "";
      qInput.placeholder = "질문 (교육생에게 보여질 주제)";

      const hint = document.createElement("p");
      hint.className = "form-hint";
      hint.style.margin = "0";
      hint.textContent = "입력 형식·1인당 개수는 변경할 수 없습니다.";

      const editStatus = document.createElement("p");
      editStatus.className = "status-msg";

      const btnRow = document.createElement("div");
      btnRow.className = "session-actions";
      const saveBtn = document.createElement("button");
      saveBtn.className = "tool-btn";
      saveBtn.textContent = "저장";
      const cancelBtn = document.createElement("button");
      cancelBtn.className = "tool-btn";
      cancelBtn.textContent = "취소";

      cancelBtn.addEventListener("click", renderSessionList);
      saveBtn.addEventListener("click", async () => {
        const newName = nameInput.value.trim();
        const newQ = qInput.value.trim();
        if (!newName) {
          editStatus.textContent = "세션 이름을 입력해 주세요.";
          editStatus.className = "status-msg error";
          return;
        }
        if (!newQ) {
          editStatus.textContent = "질문을 입력해 주세요.";
          editStatus.className = "status-msg error";
          return;
        }
        saveBtn.disabled = true;
        cancelBtn.disabled = true;
        editStatus.textContent = "저장 중...";
        editStatus.className = "status-msg";
        try {
          await sessionRef(db, s.code).child("meta").update({ name: newName, q: newQ });
          await updateMySession(s.code, { name: newName, q: newQ });
          renderSessionList();
        } catch (err) {
          editStatus.textContent = "저장에 실패했습니다. 로그인 상태를 확인하고 다시 시도해 주세요.";
          editStatus.className = "status-msg error";
          saveBtn.disabled = false;
          cancelBtn.disabled = false;
        }
      });

      btnRow.appendChild(saveBtn);
      btnRow.appendChild(cancelBtn);
      form.appendChild(nameInput);
      form.appendChild(qInput);
      form.appendChild(hint);
      form.appendChild(editStatus);
      form.appendChild(btnRow);
      item.appendChild(form);
      qInput.focus();
    }

    /* ── 세션 만들기 ── */
    function todayPrefix() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}_`;
    }

    document.getElementById("createBtn").addEventListener("click", async () => {
      if (!db) return;
      const name = document.getElementById("sessionName").value.trim();
      const question = document.getElementById("question").value.trim();
      if (!name || name === todayPrefix()) {
        createStatus.textContent = "세션 이름을 입력해 주세요. (예: 20260712_AI기초)";
        createStatus.className = "status-msg error";
        return;
      }
      if (!question) {
        createStatus.textContent = "질문을 입력해 주세요.";
        createStatus.className = "status-msg error";
        return;
      }
      const maxPerUser = Number(document.getElementById("maxPerUser").value);
      const mode = document.getElementById("inputMode").value === "phrase" ? "phrase" : "word";

      let code = "";
      for (let i = 0; i < 5; i++) {
        const candidate = generateSessionCode();
        const exists = (await sessionRef(db, candidate).child("meta").get()).exists();
        if (!exists) { code = candidate; break; }
      }
      if (!code) {
        createStatus.textContent = "코드 생성에 실패했습니다. 다시 시도해 주세요.";
        createStatus.className = "status-msg error";
        return;
      }

      const created = Date.now();
      await sessionRef(db, code).child("meta").set({
        q: question,
        max: maxPerUser,
        mode,
        name,
        created: firebase.database.ServerValue.TIMESTAMP
      });
      await saveMySession({ code, name, q: question, mode, max: maxPerUser, created });
      location.href = "present.html?code=" + encodeURIComponent(code);
    });

    /* ── 코드로 열기 (목록에도 추가) ── */
    document.getElementById("reopenBtn").addEventListener("click", async () => {
      if (!db) return;
      const code = document.getElementById("reopenCode").value.trim().toUpperCase();
      if (code.length !== 4) {
        reopenStatus.textContent = "4자리 코드를 입력해 주세요.";
        reopenStatus.className = "status-msg error";
        return;
      }
      const snap = await sessionRef(db, code).child("meta").get();
      if (!snap.exists()) {
        reopenStatus.textContent = "해당 코드의 세션이 없습니다.";
        reopenStatus.className = "status-msg error";
        return;
      }
      const meta = snap.val();
      await saveMySession({
        code,
        name: meta.name || "(이름 없음)",
        q: meta.q,
        mode: meta.mode || "word",
        max: meta.max,
        created: meta.created || Date.now()
      });
      location.href = "present.html?code=" + encodeURIComponent(code);
    });

    /* ── 로그아웃 ── */
    document.getElementById("logoutLink").addEventListener("click", (e) => {
      e.preventDefault();
      signOutInstructor();
    });

    /* ── 초기화 (강사 로그인 후 진입) ── */
    requireInstructor(async (user) => {
      document.getElementById("sessionName").value = todayPrefix();
      await initSessionList(user);
      // 발표 화면에서 세션을 종료하고 넘어온 경우 지난 세션 목록을 바로 펼쳐 준다
      if (new URLSearchParams(location.search).get("find") === "1") {
        await findMissingSessions();
        const findBtn = document.getElementById("findBtn");
        if (findBtn.scrollIntoView) findBtn.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    });
  </script>
</body>
</html>
