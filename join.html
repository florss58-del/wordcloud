<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어 제출 - 실시간 워드클라우드</title>
  <link rel="stylesheet" href="./css/style.css?v=11" />
</head>
<body>
  <div class="page-title">
    <h1><svg class="icon title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg> 워드클라우드 참여</h1>
  </div>

  <main>
    <div class="container">
      <div class="card">
        <p id="question" class="join-question">질문을 불러오는 중...</p>
        <p id="remain" class="join-remain"></p>

        <div id="inputArea">
          <div class="field hidden" id="nickField">
            <input id="nickInput" class="input" maxlength="12" placeholder="이름 (최대 12자)" autocomplete="off" />
          </div>
          <div class="field">
            <input id="wordInput" class="input" maxlength="12" placeholder="단어 하나만 입력 (최대 12자)" autocomplete="off" />
          </div>
          <button id="submitBtn" class="btn btn-primary btn-block">제출하기</button>
          <p id="status" class="status-msg"></p>
        </div>

        <div id="doneArea" class="join-done hidden">
          <p class="big"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="#0066cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg></p>
          <p><strong>제출 완료!</strong><br />이제 앞의 화면을 봐주세요.</p>
          <div id="editArea" class="hidden">
            <p class="join-mylink" id="myLink"></p>
            <button id="editBtn" class="btn btn-ghost btn-block">잘못 올렸어요 · 고치기</button>
          </div>
        </div>

        <div id="closedArea" class="join-done hidden">
          <p class="big"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="#86868b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></p>
          <p><strong>세션이 종료되었습니다</strong><br />참여해 주셔서 감사합니다</p>
        </div>

        <div id="myWords" class="submitted-words"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__line">
      &copy; 2026 EUNACLASS
      <span class="footer__sep">&middot;</span>
      AI Learning Tools for Education
    </p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="./js/firebase-config.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/korean.js"></script>
  <script>
    const db = initFirebase();
    const code = getCodeFromUrl();
    const clientId = getClientId();

    const questionEl = document.getElementById("question");
    const remainEl = document.getElementById("remain");
    const inputArea = document.getElementById("inputArea");
    const doneArea = document.getElementById("doneArea");
    const closedArea = document.getElementById("closedArea");
    const wordInput = document.getElementById("wordInput");
    const nickField = document.getElementById("nickField");
    const nickInput = document.getElementById("nickInput");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const myWordsEl = document.getElementById("myWords");

    const editArea = document.getElementById("editArea");
    const editBtn = document.getElementById("editBtn");
    const myLinkEl = document.getElementById("myLink");

    let maxPerUser = 3;
    let inputMode = "word"; // "word" | "phrase" | "link"
    let sessionClosed = false;
    const storageKey = "wc_submitted_" + code;
    let myWords = JSON.parse(localStorage.getItem(storageKey) || "[]");

    // 작품 링크 모드 — 내가 올린 항목의 키를 기억해 두면 나중에 고칠 수 있다
    const linkKey = "wc_link_" + code;
    let myEntry = JSON.parse(localStorage.getItem(linkKey) || "null"); // {id, nick, url}

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status-msg " + (type || "");
    }

    function renderMyState() {
      const left = maxPerUser - myWords.length;
      if (inputMode === "link") {
        remainEl.textContent = myWords.length ? "" : "이름과 작품 주소를 올려요";
      } else {
        remainEl.textContent = myWords.length
          ? `제출 ${myWords.length}/${maxPerUser}개`
          : `${maxPerUser}개까지 제출할 수 있어요`;
      }
      myWordsEl.innerHTML = myWords.map((w) => `<span class="chip">${escapeHtml(w)}</span>`).join("");

      if (sessionClosed) {
        inputArea.classList.add("hidden");
        doneArea.classList.add("hidden");
        closedArea.classList.remove("hidden");
        return;
      }
      closedArea.classList.add("hidden");
      if (left <= 0) {
        inputArea.classList.add("hidden");
        doneArea.classList.remove("hidden");
        // 링크 모드에서는 잘못 올렸을 때 고칠 수 있게 열어 둔다
        if (inputMode === "link" && myEntry) {
          myLinkEl.textContent = myEntry.nick + " · " + myEntry.url;
          editArea.classList.remove("hidden");
        }
      } else {
        inputArea.classList.remove("hidden");
        doneArea.classList.add("hidden");
      }
    }

    async function init() {
      if (!db) return;
      if (!code) {
        questionEl.textContent = "잘못된 접속입니다. QR코드나 링크로 다시 접속해 주세요.";
        inputArea.classList.add("hidden");
        return;
      }
      const snap = await sessionRef(db, code).child("meta").get();
      if (!snap.exists()) {
        questionEl.textContent = "세션을 찾을 수 없습니다. 코드를 확인해 주세요.";
        inputArea.classList.add("hidden");
        return;
      }
      const meta = snap.val();
      questionEl.textContent = meta.q;
      maxPerUser = Number(meta.max) || 3;
      inputMode = meta.mode === "phrase" || meta.mode === "link" ? meta.mode : "word";

      // 강사가 주제를 수정하면 학생 화면에도 즉시 반영
      sessionRef(db, code).child("meta").child("q").on("value", (qSnap) => {
        const q = qSnap.val();
        if (typeof q === "string" && q.length) questionEl.textContent = q;
      });
      if (inputMode === "phrase") {
        wordInput.maxLength = 30;
        wordInput.placeholder = "짧은 문구를 입력하세요 (최대 30자)";
      } else if (inputMode === "link") {
        document.title = "작품 공유 - EUNACLASS";
        nickField.classList.remove("hidden");
        wordInput.maxLength = 300;
        wordInput.type = "url";
        wordInput.placeholder = "만든 작품의 주소를 붙여넣기";
        wordInput.inputMode = "url";
        submitBtn.textContent = "내 작품 올리기";
      }
      renderMyState();
      (inputMode === "link" ? nickInput : wordInput).focus();

      // 강사가 세션을 종료하면 실시간으로 입력 차단
      sessionRef(db, code).child("closed").on("value", (closedSnap) => {
        sessionClosed = closedSnap.val() === true;
        renderMyState();
      });
    }

    /* 도구마다 주소를 https:// 없이 복사해 주기도 한다 (Canva의 "사이트 주소" 복사 버튼이 그렇다).
       학생이 붙여넣은 그대로 막히면 안 되므로 앞을 채워 준다. 주소가 아니면 null. */
    function normalizeUrl(raw) {
      let url = (raw || "").trim().replace(/\s+/g, "");
      if (!url) return null;
      if (url.startsWith("http://")) url = "https://" + url.slice(7);
      if (!url.startsWith("https://")) {
        // 도메인처럼 생겼을 때만 앞을 채운다 (제목·아이디를 붙여넣은 경우와 구분)
        if (!/^[\w-]+(\.[\w-]+)+(\/.*)?$/.test(url)) return null;
        url = "https://" + url;
      }
      try { new URL(url); } catch (e) { return null; }
      return url;
    }

    // 작품 링크 모드 — 주소가 아닌 입력(제목·아이디)을 학생 눈높이로 잡아준다
    async function submitLink() {
      // 이미 올렸어도 "고치기"로 다시 올리는 건 허용한다 (myEntry가 있으면 덮어쓰기)
      if (sessionClosed) return;
      if (!myEntry && myWords.length >= maxPerUser) return;

      const nick = nickInput.value.trim();
      const url = normalizeUrl(wordInput.value);

      if (nick.length < 1) { setStatus("이름을 먼저 적어주세요.", "error"); nickInput.focus(); return; }
      if (nick.length > 12) { setStatus("이름은 12자까지예요.", "error"); return; }
      if (!wordInput.value.trim()) { setStatus("작품 주소를 붙여넣어 주세요.", "error"); return; }
      if (!url) {
        setStatus("주소가 아닌 것 같아요. 작품 주소를 복사해 붙여넣어 주세요.", "error");
        return;
      }
      if (url.length > 300) { setStatus("주소가 너무 길어요. 다시 확인해 주세요.", "error"); return; }

      submitBtn.disabled = true;
      try {
        const payload = {
          w: url,
          n: nick,
          c: clientId,
          t: firebase.database.ServerValue.TIMESTAMP
        };

        if (myEntry && myEntry.id) {
          // 고치기 — 발표 화면의 카드가 제자리에서 바뀐다 (새 카드가 생기지 않는다)
          await sessionRef(db, code).child("entries").child(myEntry.id).set(payload);
          myEntry = { id: myEntry.id, nick, url };
          setStatus("고쳤어요! 앞 화면을 봐주세요.", "success");
        } else {
          const ref = await sessionRef(db, code).child("entries").push(payload);
          myEntry = { id: ref.key, nick, url };
          myWords.push(nick);
          localStorage.setItem(storageKey, JSON.stringify(myWords));
          setStatus("올렸어요! 앞 화면을 봐주세요.", "success");
        }
        localStorage.setItem(linkKey, JSON.stringify(myEntry));
        wordInput.value = "";
        renderMyState();
      } catch (error) {
        setStatus("올리지 못했어요. 잠시 후 다시 시도해 주세요.", "error");
      } finally {
        submitBtn.disabled = false;
      }
    }

    // 고치기 — 올렸던 이름·주소를 그대로 불러와 다시 입력창을 연다
    if (editBtn) {
      editBtn.addEventListener("click", () => {
        if (!myEntry) return;
        nickInput.value = myEntry.nick;
        wordInput.value = myEntry.url;
        submitBtn.textContent = "고쳐서 다시 올리기";
        doneArea.classList.add("hidden");
        inputArea.classList.remove("hidden");
        setStatus("", "");
        wordInput.focus();
        wordInput.select();
      });
    }

    async function submitWord() {
      if (inputMode === "link") return submitLink();
      if (sessionClosed || myWords.length >= maxPerUser) return;

      const result = inputMode === "phrase" ? validatePhrase(wordInput.value) : validateWord(wordInput.value);
      if (!result.ok) { setStatus(result.reason, "error"); return; }
      // 답이 아닌 게 분명한 입력만 막는다 (세션 코드 그대로 적기, 한 글자 답)
      if (result.word.toUpperCase() === code) {
        setStatus("참여 코드 말고, 질문에 대한 답을 적어주세요.", "error");
        return;
      }
      if (inputMode === "word" && result.word.length < 2) {
        setStatus("두 글자 이상으로 적어주세요.", "error");
        return;
      }
      if (myWords.includes(result.word)) {
        setStatus("이미 제출한 단어예요. 다른 단어를 적어주세요.", "error");
        return;
      }

      submitBtn.disabled = true;
      try {
        await sessionRef(db, code).child("entries").push({
          w: result.word,
          c: clientId,
          t: firebase.database.ServerValue.TIMESTAMP
        });
        myWords.push(result.word);
        localStorage.setItem(storageKey, JSON.stringify(myWords));
        wordInput.value = "";
        setStatus(`“${result.word}” 제출 완료!`, "success");
        renderMyState();
      } catch (error) {
        setStatus("제출에 실패했어요. 잠시 후 다시 시도해 주세요.", "error");
      } finally {
        submitBtn.disabled = false;
        wordInput.focus();
      }
    }

    submitBtn.addEventListener("click", submitWord);
    wordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") submitWord(); });
    nickInput.addEventListener("keydown", (e) => { if (e.key === "Enter") wordInput.focus(); });

    init();
  </script>
</body>
</html>
