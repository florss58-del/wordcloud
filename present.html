<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발표 화면 - 실시간 워드클라우드</title>
  <link rel="stylesheet" href="./css/style.css?v=10" />
</head>
<body class="present-page auth-pending">
  <div class="present-wrap">
    <header class="present-header">
      <h1 id="question" class="present-question">불러오는 중...</h1>
      <div class="present-stats">
        <span>참여 <strong id="participantCount">0</strong>명</span>
        <span>단어 <strong id="entryCount">0</strong>개</span>
      </div>
    </header>

    <canvas id="cloudCanvas"></canvas>
    <div id="gallery" class="gallery hidden"></div>

    <aside class="present-side" id="sidePanel" title="클릭하면 크게 보여요">
      <div id="qrBox"></div>
      <div class="join-code" id="joinCode">----</div>
      <div class="join-hint">QR 스캔 또는 홈에서<br />코드 입력으로 참여</div>
      <div class="join-hint" style="color:var(--accent)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg> 클릭하면 크게</div>
    </aside>

    <div class="present-toolbar">
      <button id="adminBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> 관리</button>
      <button id="qrBigBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg> QR 크게</button>
      <button id="pauseBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/></svg> 일시정지</button>
      <button id="themeBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg> 어둡게</button>
      <button id="qrToggleBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c7 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 7 10 7a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg> QR 숨기기</button>
      <button id="rareBtn" class="tool-btn" title="한 사람만 적은 단어(오타·장난)를 화면에서 감춥니다"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg> 1표 숨기기</button>
      <button id="resultsBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg> 결과 보기</button>
      <button id="saveBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> PNG 저장</button>
      <button id="resetBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 초기화</button>
      <button id="closeSessionBtn" class="tool-btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 세션 종료</button>
      <div class="toolbar-spacer"></div>
      <span class="latest-word" id="latestWord"></span>
    </div>
  </div>

  <!-- QR 크게 보기 오버레이 -->
  <div id="qrFocus" class="qr-focus hidden">
    <p class="qr-focus-title" id="qrFocusQuestion"></p>
    <div id="qrBoxBig" class="qr-focus-box"></div>
    <div class="qr-focus-code" id="qrFocusCode">----</div>
    <p class="qr-focus-hint">휴대폰 카메라로 QR을 찍거나, 접속 후 위 코드를 입력하세요</p>
    <p class="qr-focus-close-hint">화면을 클릭하면 워드클라우드로 돌아갑니다</p>
  </div>

  <!-- 결과 보기 (빈도표 + CSV) -->
  <div id="resultsOverlay" class="results-overlay hidden">
    <div class="results-card">
      <div class="results-head">
        <p class="results-title" id="resultsTitle"></p>
        <p class="results-sub" id="resultsSub"></p>
      </div>
      <div class="results-body" id="resultsBody"></div>
      <div class="results-foot">
        <label class="results-toggle"><input type="checkbox" id="includeHidden" /> 숨긴 단어 포함</label>
        <div class="spacer"></div>
        <button id="csvBtn" class="btn btn-ghost">CSV 내보내기</button>
        <button id="closeResultsBtn" class="btn btn-primary">닫기</button>
      </div>
    </div>
  </div>

  <!-- 단어 클릭 시 강조 오버레이 -->
  <div id="wordFocus" class="word-focus hidden">
    <div class="focus-word" id="focusWord"></div>
    <div class="focus-count" id="focusCount"></div>
    <div class="focus-actions">
      <button id="hideWordBtn" class="btn btn-ghost" style="background:transparent;color:#fff;border-color:rgba(255,255,255,0.7)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c7 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 7 10 7a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg> 이 단어 숨기기</button>
      <button id="closeFocusBtn" class="btn btn-primary">닫기</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./js/firebase-config.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/korean.js"></script>
  <script src="./js/auth.js"></script>
  <script>
    const db = initFirebase();
    const code = getCodeFromUrl();

    const canvas = document.getElementById("cloudCanvas");
    const questionEl = document.getElementById("question");
    const participantCountEl = document.getElementById("participantCount");
    const entryCountEl = document.getElementById("entryCount");
    const latestWordEl = document.getElementById("latestWord");

    // 툴바 라인 아이콘 (토글 버튼용)
    const svgIcon = (paths) => `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
    const ICONS = {
      pause: svgIcon('<rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/>'),
      play: svgIcon('<polygon points="6 3 20 12 6 21 6 3"/>'),
      moon: svgIcon('<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>'),
      sun: svgIcon('<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/>'),
      eye: svgIcon('<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>'),
      eyeOff: svgIcon('<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c7 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 7 10 7a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>'),
      lock: svgIcon('<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'),
      unlock: svgIcon('<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>'),
      filter: svgIcon('<path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>'),
      filterOff: svgIcon('<path d="M2 2 22 22"/><path d="M22 3H5.6"/><path d="M10 8.5V12l4 2v-4.5"/>')
    };

    // 단어 색상 팔레트 — 흰 배경·어두운 배경 모두에서 대비가 충분한 진한 톤만 사용
    const PALETTE_LIGHT = ["#1d1d1f", "#0066cc", "#c2185b", "#1a7f37", "#6d28d9", "#b45309", "#0e7490"];
    const PALETTE_DARK = ["#f5f5f7", "#4da3ff", "#ff7aa8", "#4ade80", "#c4a2ff", "#fbbf24", "#5ad2e6"];

    const state = {
      counts: new Map(),     // word -> count
      clients: new Set(),    // 고유 참여자
      hidden: new Set(),     // 숨긴 단어
      totalEntries: 0,
      paused: false,
      dirty: false,
      dark: false,
      hideRare: false        // 1표만 받은 단어 감추기
    };

    let renderTimer = null;

    // 고해상도 화면에서도 또렷하게 — 캔버스 픽셀을 배율만큼 늘려 그린다
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      scheduleRender();
    }

    function scheduleRender() {
      if (state.paused) { state.dirty = true; return; }
      clearTimeout(renderTimer);
      renderTimer = setTimeout(renderCloud, 400);
    }

    // 상위 60개만 — 너무 많으면 글자가 작아져 뒤에서 안 보인다
    const MAX_WORDS = 60;
    // 무응답성 답 — 클라우드에서는 빼고, 결과 보기·CSV에는 그대로 남긴다
    const NO_ANSWER = new Set(["없음", "모르겠", "모름"]);

    function visibleList() {
      const list = [...state.counts.entries()]
        .filter(([word]) => !state.hidden.has(word) && !NO_ANSWER.has(word))
        .sort((a, b) => b[1] - a[1]);

      // 1표짜리(오타·장난)를 감춘다. 단, 전부 1표뿐이면 화면이 비므로 그대로 둔다
      if (state.hideRare) {
        const repeated = list.filter(([, count]) => count >= 2);
        if (repeated.length) return repeated.slice(0, MAX_WORDS);
      }
      return list.slice(0, MAX_WORDS);
    }

    // 단어마다 색을 고정(같은 단어는 늘 같은 색)하고, 많이 나온 단어일수록 진하게
    function hashOf(word) {
      let h = 0;
      for (let i = 0; i < word.length; i++) h = (h * 31 + word.charCodeAt(i)) >>> 0;
      return h;
    }

    function colorFor(word, count, maxCount) {
      const palette = state.dark ? PALETTE_DARK : PALETTE_LIGHT;
      const hex = palette[hashOf(word) % palette.length];
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const ratio = maxCount > 1 ? (count - 1) / (maxCount - 1) : 1;
      const alpha = 0.5 + 0.5 * Math.sqrt(ratio);   // 빈도가 낮을수록 배경에 가깝게 옅어진다
      return `rgba(${r}, ${g}, ${b}, ${alpha.toFixed(2)})`;
    }

    function renderCloud() {
      state.dirty = false;
      const list = visibleList();
      canvas.style.opacity = "1";
      if (list.length === 0) {
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = state.dark ? "#6e6e73" : "#c7c7cc";
        ctx.font = `600 ${Math.round(28 * dpr)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("단어가 도착하면 여기에 나타납니다", canvas.width / 2, canvas.height / 2);
        return;
      }

      canvas.style.opacity = "0.45"; // 새 배치 렌더링 시 부드러운 전환
      const maxCount = list[0][1];
      // 화면 크기와 최대 빈도에 맞춰 글자 크기 계산 (단어가 적을수록 크게)
      const base = Math.min(canvas.width, canvas.height);
      // 단어가 적으면 크게, 많으면 작게 — 넘치면 wordcloud2의 shrinkToFit이 알아서 줄인다
      const density = Math.max(0.8, Math.min(2.4, 14 / Math.sqrt(list.length)));
      const factor = (base / 6) * density / Math.sqrt(maxCount);

      WordCloud(canvas, {
        list,
        gridSize: Math.max(12, Math.round(base / 35)),   // 작은 단어가 큰 글자 속으로 파고들지 않게
        // 가로로 넓은 화면에서 원형으로 뭉치지 않고 좌우까지 채우도록
        ellipticity: canvas.height / canvas.width,
        weightFactor: (count) => Math.max(22 * dpr, Math.sqrt(count) * factor),
        fontFamily: '"Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif',
        fontWeight: 700,
        color: (word, weight) => colorFor(word, weight, maxCount),
        backgroundColor: state.dark ? "#1d1d1f" : "#ffffff",
        rotateRatio: 0,          // 전부 가로쓰기 — 한글은 세로로 돌면 읽기 어렵다
        shuffle: false,
        drawOutOfBound: false,
        shrinkToFit: true,
        click: (item) => openFocus(item[0], item[1])
      });
    }

    function updateStats() {
      participantCountEl.textContent = state.clients.size;
      entryCountEl.textContent = state.totalEntries;
    }

    /* ── 단어 강조 오버레이 ── */
    const focusOverlay = document.getElementById("wordFocus");
    let focusedWord = "";

    function openFocus(word, count) {
      focusedWord = word;
      document.getElementById("focusWord").textContent = word;
      document.getElementById("focusCount").textContent = `${count}명이 이 단어를 적었어요`;
      focusOverlay.classList.remove("hidden");
    }

    document.getElementById("closeFocusBtn").addEventListener("click", () => focusOverlay.classList.add("hidden"));
    focusOverlay.addEventListener("click", (e) => { if (e.target === focusOverlay) focusOverlay.classList.add("hidden"); });

    document.getElementById("hideWordBtn").addEventListener("click", () => {
      if (focusedWord) sessionRef(db, code).child("hidden").child(focusedWord).set(true);
      focusOverlay.classList.add("hidden");
    });

    /* ── 툴바 ── */
    const pauseBtn = document.getElementById("pauseBtn");
    pauseBtn.addEventListener("click", () => {
      state.paused = !state.paused;
      pauseBtn.innerHTML = state.paused ? ICONS.play + " 재개" : ICONS.pause + " 일시정지";
      pauseBtn.classList.toggle("active", state.paused);
      if (!state.paused && state.dirty) scheduleRender();
    });

    const rareBtn = document.getElementById("rareBtn");
    rareBtn.addEventListener("click", () => {
      state.hideRare = !state.hideRare;
      rareBtn.innerHTML = (state.hideRare ? ICONS.filterOff : ICONS.filter) +
        (state.hideRare ? " 1표 보이기" : " 1표 숨기기");
      rareBtn.classList.toggle("active", state.hideRare);
      renderCloud();
    });

    const themeBtn = document.getElementById("themeBtn");

    function applyTheme(dark) {
      state.dark = dark;
      document.body.classList.toggle("dark", dark);
      themeBtn.innerHTML = dark ? ICONS.sun + " 밝게" : ICONS.moon + " 어둡게";
    }

    themeBtn.addEventListener("click", () => {
      applyTheme(!state.dark);
      localStorage.setItem("wc_theme", state.dark ? "dark" : "light");
      renderCloud();
    });

    // 마지막에 선택한 테마 복원 (기본 밝게)
    if (localStorage.getItem("wc_theme") === "dark") applyTheme(true);

    /* ── QR 크게 보기 ── */
    const qrFocus = document.getElementById("qrFocus");
    let bigQrRendered = false;

    function openQrFocus() {
      if (!bigQrRendered) {
        const size = Math.min(520, Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.52));
        new QRCode(document.getElementById("qrBoxBig"), {
          text: joinUrlFor(code),
          width: size,
          height: size,
          correctLevel: QRCode.CorrectLevel.M
        });
        bigQrRendered = true;
      }
      document.getElementById("qrFocusQuestion").textContent = questionEl.textContent;
      document.getElementById("qrFocusCode").textContent = code;
      qrFocus.classList.remove("hidden");
    }

    document.getElementById("qrBigBtn").addEventListener("click", openQrFocus);
    document.getElementById("sidePanel").addEventListener("click", openQrFocus);
    qrFocus.addEventListener("click", () => qrFocus.classList.add("hidden"));

    const qrToggleBtn = document.getElementById("qrToggleBtn");
    qrToggleBtn.addEventListener("click", () => {
      const panel = document.getElementById("sidePanel");
      const hidden = panel.classList.toggle("hidden");
      qrToggleBtn.innerHTML = hidden ? ICONS.eye + " QR 보이기" : ICONS.eyeOff + " QR 숨기기";
    });

    // 질문·날짜가 함께 담긴 PNG로 저장
    document.getElementById("saveBtn").addEventListener("click", () => {
      const pad = Math.round(28 * dpr);
      const headerHeight = Math.round(96 * dpr);
      const out = document.createElement("canvas");
      out.width = canvas.width;
      out.height = canvas.height + headerHeight;
      const ctx = out.getContext("2d");

      ctx.fillStyle = state.dark ? "#1d1d1f" : "#ffffff";
      ctx.fillRect(0, 0, out.width, out.height);

      // 질문 (폭에 맞게 글자 크기 자동 축소)
      const question = questionEl.textContent;
      const fontStack = '"Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif';
      let fontSize = Math.round(30 * dpr);
      ctx.textBaseline = "top";
      do {
        ctx.font = `700 ${fontSize}px ${fontStack}`;
        if (ctx.measureText(question).width <= out.width - pad * 2) break;
        fontSize -= 2;
      } while (fontSize > 14 * dpr);
      ctx.fillStyle = state.dark ? "#f5f5f7" : "#1d1d1f";
      ctx.fillText(question, pad, pad);

      // 날짜 · 코드 · 통계
      const today = todayStamp();
      ctx.font = `400 ${Math.round(15 * dpr)}px ${fontStack}`;
      ctx.fillStyle = state.dark ? "#a1a1a6" : "#86868b";
      ctx.fillText(`${today.dot} · 코드 ${code} · 참여 ${state.clients.size}명 · 단어 ${state.totalEntries}개 · EUNACLASS`, pad, pad + fontSize + 12 * dpr);

      ctx.drawImage(canvas, 0, headerHeight);

      const link = document.createElement("a");
      link.download = `wordcloud_${code}_${today.iso}.png`;
      link.href = out.toDataURL("image/png");
      link.click();
    });

    /* ── 결과 보기 (빈도표 + CSV 내보내기) ── */
    const resultsOverlay = document.getElementById("resultsOverlay");
    const resultsBody = document.getElementById("resultsBody");
    const includeHiddenEl = document.getElementById("includeHidden");

    function todayStamp() {
      const d = new Date();
      const iso = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      return { iso, dot: iso.replace(/-/g, ".") };
    }

    // 빈도 내림차순, 같으면 가나다순
    function resultRows() {
      return [...state.counts.entries()]
        .filter(([word]) => includeHiddenEl.checked || !state.hidden.has(word))
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ko"));
    }

    function renderResults() {
      const rows = resultRows();
      document.getElementById("resultsTitle").textContent = questionEl.textContent;
      document.getElementById("resultsSub").textContent =
        `${todayStamp().dot} · 코드 ${code} · 참여 ${state.clients.size}명 · 제출 ${state.totalEntries}개 · 단어 종류 ${rows.length}개`;

      if (rows.length === 0) {
        resultsBody.innerHTML = '<p class="results-empty">아직 집계할 단어가 없습니다</p>';
        return;
      }

      const total = rows.reduce((sum, [, count]) => sum + count, 0);
      const max = rows[0][1];
      const body = rows.map(([word, count], i) => `
        <tr>
          <td class="col-rank">${i + 1}</td>
          <td><span class="results-word ${state.hidden.has(word) ? "is-hidden" : ""}">${escapeHtml(word)}</span></td>
          <td class="col-bar"><div class="results-bar-track"><div class="results-bar" style="width:${(count / max * 100).toFixed(1)}%"></div></div></td>
          <td class="col-count">${count}<span class="results-pct">${(count / total * 100).toFixed(1)}%</span></td>
        </tr>`).join("");

      resultsBody.innerHTML = `
        <table class="results-table">
          <thead><tr><th>순위</th><th>단어</th><th class="col-bar"></th><th class="col-count">횟수</th></tr></thead>
          <tbody>${body}</tbody>
        </table>`;
    }

    function openResults() {
      renderResults();
      resultsOverlay.classList.remove("hidden");
    }

    document.getElementById("resultsBtn").addEventListener("click", openResults);
    document.getElementById("closeResultsBtn").addEventListener("click", () => resultsOverlay.classList.add("hidden"));
    resultsOverlay.addEventListener("click", (e) => { if (e.target === resultsOverlay) resultsOverlay.classList.add("hidden"); });
    includeHiddenEl.addEventListener("change", renderResults);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") resultsOverlay.classList.add("hidden");
    });

    // 엑셀에서 한글이 깨지지 않도록 BOM 포함 UTF-8
    document.getElementById("csvBtn").addEventListener("click", () => {
      const rows = resultRows();
      if (rows.length === 0) { alert("내보낼 단어가 없습니다."); return; }

      const total = rows.reduce((sum, [, count]) => sum + count, 0);
      const cell = (value) => `"${String(value).replace(/"/g, '""')}"`;
      const lines = [["순위", "단어", "횟수", "비율(%)", "표시"].map(cell).join(",")];
      rows.forEach(([word, count], i) => {
        lines.push([
          i + 1,
          word,
          count,
          (count / total * 100).toFixed(1),
          state.hidden.has(word) ? "숨김" : "표시"
        ].map(cell).join(","));
      });

      const today = todayStamp();
      const blob = new Blob(["\uFEFF" + lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = `wordcloud_${code}_${today.iso}.csv`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    });

    /* ── 관리 페이지로 복귀 ── */
    document.getElementById("adminBtn").addEventListener("click", () => {
      location.href = "admin.html";
    });

    /* ── 세션 종료/재개 (종료 시 학생 제출 차단) ── */
    const closeSessionBtn = document.getElementById("closeSessionBtn");
    let sessionClosed = false;

    closeSessionBtn.addEventListener("click", async () => {
      if (sessionClosed) {
        await sessionRef(db, code).child("closed").remove();
        return;
      }
      if (!confirm("세션을 종료할까요? 학생들의 단어 제출이 차단됩니다.\n종료 후 관리 화면으로 이동합니다. (“세션 재개”로 다시 열 수 있습니다)")) return;
      await sessionRef(db, code).child("closed").set(true);
      location.href = "admin.html?find=1";   // 관리 화면에서 지난 세션을 바로 확인·정리
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      if (!confirm("모든 제출 단어를 삭제할까요? 되돌릴 수 없습니다.")) return;
      await sessionRef(db, code).child("entries").remove();
      await sessionRef(db, code).child("hidden").remove();
      state.counts.clear();
      state.clients.clear();
      state.hidden.clear();
      state.totalEntries = 0;
      gallery.length = 0;      // 작품 링크 모드
      renderGallery();
      latestWordEl.textContent = "";
      updateStats();
      renderCloud();
    });

    /* ── 작품 링크 갤러리 (mode === "link") ──
       워드클라우드는 같은 답이 겹쳐야 의미가 있지만, 작품 링크는 하나하나가 다르다.
       그래서 집계하지 않고 도착한 순서대로 카드로 깔고, 누르면 새 탭에서 그 작품을 연다. */
    const galleryEl = document.getElementById("gallery");
    const gallery = [];   // {nick, url}

    function hostOf(url) {
      try { return new URL(url).hostname.replace(/^www\./, ""); } catch (e) { return url; }
    }

    function renderGallery() {
      if (!gallery.length) {
        galleryEl.innerHTML = '<p class="gallery-empty">아직 올라온 작품이 없어요</p>';
        return;
      }
      galleryEl.innerHTML = gallery.map((item, i) => `
        <a class="gallery-card" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">
          <span class="gallery-no">${i + 1}</span>
          <span class="gallery-nick">${escapeHtml(item.nick)}</span>
          <span class="gallery-host">${escapeHtml(hostOf(item.url))}</span>
        </a>`).join("");
    }

    function addToGallery(entry) {
      gallery.push({ nick: entry.n || "익명", url: entry.w });
      renderGallery();
    }

    /* ── 실시간 구독 ── */
    async function init() {
      if (!db) return;
      if (!code) { questionEl.textContent = "세션 코드가 없습니다."; return; }

      const snap = await sessionRef(db, code).child("meta").get();
      if (!snap.exists()) { questionEl.textContent = "세션을 찾을 수 없습니다."; return; }
      document.getElementById("joinCode").textContent = code;

      const meta = snap.val() || {};
      const linkMode = meta.mode === "link";
      if (linkMode) {
        // 워드클라우드 전용 도구는 감춘다 (집계·색·1표 숨기기가 의미 없다)
        canvas.classList.add("hidden");
        galleryEl.classList.remove("hidden");
        ["rareBtn", "saveBtn", "pauseBtn", "resultsBtn"].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.classList.add("hidden");
        });
        // "단어 N개" → "작품 N개". strong 참조가 끊기지 않도록 앞의 글자만 바꾼다
        const cntLabel = entryCountEl.parentElement.firstChild;
        if (cntLabel && cntLabel.nodeType === 3) cntLabel.nodeValue = "작품 ";
        renderGallery();
      }

      // 강사가 admin에서 주제를 수정하면 발표 화면에 즉시 반영
      sessionRef(db, code).child("meta").child("q").on("value", (qSnap) => {
        const q = qSnap.val();
        if (typeof q === "string" && q.length) {
          questionEl.textContent = q;
          document.title = q + " - 실시간 워드클라우드";
        }
      });

      canvas.addEventListener("wordcloudstop", () => { canvas.style.opacity = "1"; });

      new QRCode(document.getElementById("qrBox"), {
        text: joinUrlFor(code),
        width: 110,
        height: 110,
        correctLevel: QRCode.CorrectLevel.M
      });

      sessionRef(db, code).child("entries").on("child_added", (child) => {
        const entry = child.val();
        if (!entry || typeof entry.w !== "string") return;

        if (linkMode) {
          addToGallery(entry);
          if (entry.c) state.clients.add(entry.c);
          state.totalEntries += 1;
          latestWordEl.innerHTML = `방금 도착: <strong>${escapeHtml(entry.n || "익명")}</strong>`;
          updateStats();
          return;
        }

        // 같은 대상의 오타·표기 차이를 대표 이름으로 합쳐서 집계 (챗지피티·쳇지피티·chatgpt → 챗GPT)
        expandAliases(entry.w).forEach((word) => {
          state.counts.set(word, (state.counts.get(word) || 0) + 1);
        });
        if (entry.c) state.clients.add(entry.c);
        state.totalEntries += 1;
        latestWordEl.innerHTML = `방금 도착: <strong>${escapeHtml(entry.w)}</strong>`;
        updateStats();
        scheduleRender();
      });

      sessionRef(db, code).child("hidden").on("value", (snapshot) => {
        state.hidden = new Set(Object.keys(snapshot.val() || {}));
        scheduleRender();
      });

      sessionRef(db, code).child("closed").on("value", (snapshot) => {
        sessionClosed = snapshot.val() === true;
        closeSessionBtn.innerHTML = sessionClosed ? ICONS.unlock + " 세션 재개" : ICONS.lock + " 세션 종료";
        closeSessionBtn.classList.toggle("active", sessionClosed);
      });

      resizeCanvas();
    }

    window.addEventListener("resize", resizeCanvas);
    requireInstructor(init); // 강사 로그인 후 발표 화면 시작
  </script>
</body>
</html>
